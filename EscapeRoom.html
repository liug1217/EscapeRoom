<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#AED7FF">
  <title>碧潭密室</title>

  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      width: 100%;
      height: 100%;
      background: #1a1a1a;
      overscroll-behavior: none;
    }

    #map {
      position: fixed;
      top: calc(env(safe-area-inset-top) * -1);
      left: 0;
      width: 100vw;
      height: calc(100dvh + env(safe-area-inset-top) + env(safe-area-inset-bottom));
    }

    /* Rectangle 1 */
    .rectangle1 {
      box-sizing: border-box;
      position: absolute;
      width: calc(100% - 20px);
      height: 100px;
      left: 10px;
      bottom: 10px;
      background: #353535;
      border: 1px solid #9D817D;
      border-radius: 10px;
      z-index: 10;
    }

    /* Rectangle 2 */
    .rectangle2 {
      box-sizing: border-box;
      position: absolute;
      width: calc(100% - 380px);
      height: 20px;
      left: 120px;
      right: 200px;
      bottom: 100px;
      background: #353535;
      border: 1px solid #9D817D;
      border-radius: 5px;
      z-index: 11;
    }

    .aru-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 12px;
      color: #fff;
      pointer-events: none;
      white-space: nowrap;
    }
  </style>
</head>
<body>

<div id="map"></div>

<div class="rectangle1"></div>
<div class="rectangle2"><div class="aru-text">阿瑠</div></div>

<script>
  const startPoint = [121.53757876493243, 24.957843316982597];

  const map = new maplibregl.Map({
    container: 'map',
    style: 'https://tiles.openfreemap.org/styles/liberty',
    center: startPoint,
    zoom: 15.5,
    pitch: 60,
    bearing: -20
  });

  map.addControl(new maplibregl.NavigationControl());

  const points = [
    startPoint,
    [121.53718727937625, 24.958020472873933],
    [121.53700218472507, 24.958708953293844],
    [121.5359826848114, 24.956359743373927]
  ];

  points.forEach((p, i) => {
    new maplibregl.Marker()
      .setLngLat(p)
      .setPopup(new maplibregl.Popup().setText(`第${i+1}點`))
      .addTo(map);
  });

  function loadRoute() {
    const data = {
      type: 'FeatureCollection',
      features: [{
        type: 'Feature',
        geometry: {
          type: 'LineString',
          coordinates: points
        }
      }]
    };

    if (!map.getSource('route')) {
      map.addSource('route', { type: 'geojson', data });
      map.addLayer({
        id: 'route-line',
        type: 'line',
        source: 'route',
        paint: {
          'line-color': '#ff5a5f',
          'line-width': 5
        }
      });
    }
  }

  map.on('load', loadRoute);
</script>

</body>
</html>
