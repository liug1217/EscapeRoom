<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>碧潭密室</title>

  <!-- MapLibre GL JS (3D 地圖) -->
  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>

  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    /* Rectangle 1 - full width */
    .rect1 {
      box-sizing: border-box;
      position: absolute;
      width: calc(100% - 20px);
      height: 120px;
      left: 10px;
      right: 10px;
      bottom: 10px;
      background: #353535;
      border: 1px solid #9D817D;
      box-shadow: 0px 4px 4px rgba(0, 0, 0, 0.25);
      border-radius: 10px;
      z-index: 10;
      padding: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Rectangle 2 now becomes container for label */
    .rect2 {
      box-sizing: border-box;
      position: absolute;
      width: calc(100% - 380px);
      height: 20px;
      left: 120px;
      right: 260px;
      bottom: 120px;
      background: #353535;
      border: 1px solid #9D817D;
      box-shadow: 0px 4px 4px rgba(0, 0, 0, 0.25);
      border-radius: 5px;
      z-index: 11;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* 阿瑠 centered inside Rectangle 2 */
    .label {
      font-family: 'SF Pro';
      font-style: normal;
      font-weight: 400;
      font-size: 12px;
      line-height: 14px;
      color: #FFFFFF;
      text-shadow: 0px 4px 4px rgba(0, 0, 0, 0.25);
    }

    /* dialog under Rectangle 2 */
    .dialog {
      position: absolute;
      left: 50%;
      transform: translateX(calc(-50% + 3px));
      bottom: 75px;
      width: 388px;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      font-weight: 400;
      font-size: 12px;
      line-height: 15px;
      color: #FFFFFF;
      text-align: left;
      z-index: 13;
      text-shadow: 0px 4px 4px rgba(0, 0, 0, 0.25);
    }
  
    /* Rectangle 3 */
    .rect3 {
      box-sizing: border-box;
      position: absolute;
      width: 60px;
      height: 20px;
      right: 20px;
      bottom: 20px;
      background: #353535;
      border: 1px solid #9D817D;
      box-shadow: 0px 4px 4px rgba(0, 0, 0, 0.25);
      border-radius: 5px;
      z-index: 14;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* 繼續 */
    .continue-label {
      font-family: 'SF Pro';
      font-style: normal;
      font-weight: 400;
      font-size: 12px;
      line-height: 14px;
      text-align: center;
      color: #FFFFFF;
      text-shadow: 0px 4px 4px rgba(0, 0, 0, 0.25);
    }
  </style>
</head>
<body>

  <div id="map"></div>

  <!-- UI Overlay -->
  <div class="rect1"></div>

  <div class="rect2">
    <div class="label">阿瑠</div>
  </div>

  <div class="dialog">聽好，碧潭底部的地底大圳正面臨崩塌危機，如果不在太陽落山前解開郭錫瑠大人的七道機關，新店和台北盆地將會陷入大乾旱！看到你面前那塊刻滿字的石碑了嗎？</div>

  <div class="rect3">
    <div class="continue-label">繼續</div>
  </div>

  <script>
    const startPoint = [121.53757876493243, 24.957843316982597];

    const map = new maplibregl.Map({
      container: 'map',
      style: 'https://tiles.openfreemap.org/styles/liberty',
      center: startPoint,
      zoom: 15.5,
      pitch: 60,
      bearing: -20
    });

    map.addControl(new maplibregl.NavigationControl());
    map.addControl(new maplibregl.GeolocateControl({
      positionOptions: { enableHighAccuracy: true },
      trackUserLocation: true,
      showUserHeading: true
    }));

    new maplibregl.Marker()
      .setLngLat(startPoint)
      .setPopup(new maplibregl.Popup().setText('起點'))
      .addTo(map);

    const point2 = [121.53718727937625, 24.958020472873933];
    new maplibregl.Marker().setLngLat(point2).setPopup(new maplibregl.Popup().setText('第二個點')).addTo(map);

    const point3 = [121.53700218472507, 24.958708953293844];
    new maplibregl.Marker().setLngLat(point3).setPopup(new maplibregl.Popup().setText('第三個點')).addTo(map);

    const point7 = [121.5359826848114, 24.956359743373927];
    new maplibregl.Marker().setLngLat(point7).setPopup(new maplibregl.Popup().setText('第七個點')).addTo(map);

    function loadStraightRoute() {
      const routeCoordinates = [startPoint, point2, point3, point7];

      const routeData = {
        type: 'FeatureCollection',
        features: [{
          type: 'Feature',
          properties: {},
          geometry: {
            type: 'LineString',
            coordinates: routeCoordinates
          }
        }]
      };

      if (!map.getSource('planned-route')) {
        map.addSource('planned-route', { type: 'geojson', data: routeData });
        map.addLayer({
          id: 'planned-route-line',
          type: 'line',
          source: 'planned-route',
          layout: { 'line-cap': 'round', 'line-join': 'round' },
          paint: { 'line-color': '#ff5a5f', 'line-width': 5, 'line-opacity': 0.85 }
        });
      } else {
        map.getSource('planned-route').setData(routeData);
      }

      const bounds = routeCoordinates.reduce(
        (acc, coord) => acc.extend(coord),
        new maplibregl.LngLatBounds(routeCoordinates[0], routeCoordinates[0])
      );

      map.fitBounds(bounds, { padding: 60 });
    }

    map.on('load', () => loadStraightRoute());
  </script>

<script>
    document.addEventListener('DOMContentLoaded', () => {
      const el = document.querySelector('.dialog');
      const text = el.textContent;
      el.textContent = '';
      let i = 0;
      const speed = 35;
      function type() {
        if (i < text.length) {
          el.textContent += text.charAt(i);
          i++;
          setTimeout(type, speed);
        }
      }
      type();
    });
  </script>
</body>
</html>
